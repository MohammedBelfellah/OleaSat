                        },
                        {
                            label: locale.oleasatLabel,
                            data: [0, 0, 3000], // Only subscription
                            backgroundColor: '#556B2F'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: locale.title }
                    },
                    scales: {
                        y: { stacked: true },
                        x: { stacked: true }
                    }
                }
            });
        }

        function initModelChart() {
            const locale = getLocale().charts.model;
            const ctx = document.getElementById('modelChart').getContext('2d');
            if (modelChartInstance) modelChartInstance.destroy();
            modelChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: locale.labels,
                    datasets: [
                        {
                            label: locale.lstmLabel,
                            data: [0.12, 0.15, 0.18, 0.22, 0.25, 0.30, 0.35], // Higher error over time
                            borderColor: '#EF4444',
                            borderWidth: 2,
                            tension: 0.3
                        },
                        {
                            label: locale.tftLabel,
                            data: [0.05, 0.06, 0.07, 0.08, 0.09, 0.10, 0.11], // Lower error, more stable
                            borderColor: '#10B981',
                            borderWidth: 2,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return context.dataset.label + ': ' + context.raw + locale.tooltipSuffix;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            title: { display: true, text: locale.yTitle },
                            suggestedMax: 0.4
                        }
                    }
                }
            });
        }

        // --- INIT ---
        const storedLang = localStorage.getItem('lang');
        if (storedLang && appData.translations[storedLang]) {
            appData.currentLang = storedLang;
        }

        applyLanguage();
        renderContent(appData.currentTab);
        initNav();

    </script>
</body>

</html>
